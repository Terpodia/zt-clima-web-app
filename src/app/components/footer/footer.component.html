<footer class="section">
  <div class="section-inner columns">
    <div class="brand">
      <img
        alt="ZT Clima — Soluciones en Climatización"
        src="assets/logo-alt.svg"
        height="60"
        width="233"
      />
    </div>

    <nav class="col" aria-label="Páginas del sitio">
      <p class="col-title">Página</p>
      <a routerLink="/aire">Aire acondicionado</a>
      <a routerLink="/calefaccion">Calefacción</a>
      <a routerLink="/nosotros">Nosotros</a>
      <button class="linklike" type="button" (click)="scrollToContact()">
        Contactar
      </button>
    </nav>

    <div class="col">
      <p class="col-title">Contacto</p>
      <a href="tel:+{{ site.phoneCalefaccion }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.34 1.78.65 2.63a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.45-1.22a2 2 0 0 1 2.11-.45c.85.31 1.73.53 2.63.65A2 2 0 0 1 22 16.92z"/>
        </svg>
        {{ site.phoneDisplay }}
      </a>
      <a href="mailto:{{ site.email }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-10 5L2 7"/>
        </svg>
        {{ site.email }}
      </a>
      <a [href]="site.mapsUrl" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        {{ site.address }}
      </a>
    </div>
  </div>

  <div class="section-inner copyright">
    <p>Copyright © {{ year }} ZT Clima. Todos los derechos reservados.</p>
  </div>
</footer>
