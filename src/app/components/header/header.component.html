<div class="header-wrap">
  <nav class="navbar" [class.navbar--open]="menuOpen()">
    <a routerLink="/" aria-label="Ir al inicio" (click)="closeMenu()">
      <img
        alt="ZT Clima — Soluciones en Climatización"
        src="assets/logo-alt.svg"
        height="48"
        width="186"
      />
    </a>

    <button
      class="hamburger"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Abrir menú de navegación"
      aria-controls="nav-items"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="items" id="nav-items">
      <a
        routerLink="/aire"
        routerLinkActive="active"
        (click)="closeMenu()"
        >Aire acondicionado</a
      >
      <a
        routerLink="/calefaccion"
        routerLinkActive="active"
        (click)="closeMenu()"
        >Calefacción</a
      >
      <a
        routerLink="/nosotros"
        routerLinkActive="active"
        (click)="closeMenu()"
        >Nosotros</a
      >
      <button class="btn-pill" type="button" (click)="scrollToContact()">
        Contactar
      </button>
    </div>
  </nav>
</div>
