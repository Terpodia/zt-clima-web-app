<section class="hero">
  <img class="bg" [src]="image" alt="" fetchpriority="high" />
  <div class="veil" [style.opacity]="overlay"></div>
  <div class="content">
    @if (title) {
      <h1>{{ title }}</h1>
    }
    @if (subtitle) {
      <p class="subtitle">{{ subtitle }}</p>
    }
    <ng-content></ng-content>
  </div>
</section>
