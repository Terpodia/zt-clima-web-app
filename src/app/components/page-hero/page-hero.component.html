<section class="hero">
  <img
    class="bg"
    [src]="image"
    [srcset]="srcset"
    sizes="100vw"
    width="1920"
    height="1074"
    alt=""
    fetchpriority="high"
  />
  <div class="veil" [style.opacity]="overlay"></div>
  <div class="content">
    @if (title) {
      <h1>{{ title }}</h1>
    }
    @if (subtitle) {
      <p class="subtitle">{{ subtitle }}</p>
    }
    <ng-content></ng-content>
  </div>
</section>
